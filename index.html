<!DOCTYPE html>
<html>
<head>
    <title>Crypto Paper Bot Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #081028;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            color: #22c55e;
        }

        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .card {
            background: #1a2742;
            padding: 20px;
            border-radius: 12px;
            min-width: 220px;
        }

        .big {
            font-size: 32px;
            font-weight: bold;
        }

        .green {
            color: #22c55e;
        }

        .red {
            color: #ef4444;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            background: #16213a;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #2d3b5c;
            text-align: left;
        }

        th {
            background: #334155;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<h1>Crypto Paper Bot Dashboard</h1>

<button onclick="loadDashboard()">Refresh Dashboard</button>

<div class="cards">
    <div class="card">
        <div>Portfolio Value</div>
        <div id="value" class="big">$0</div>
    </div>

    <div class="card">
        <div>Cash</div>
        <div id="cash" class="big">$0</div>
    </div>

    <div class="card">
        <div>Total Trades</div>
        <div id="trades" class="big">0</div>
    </div>

    <div class="card">
        <div>Win Rate</div>
        <div id="winrate" class="big">0%</div>
    </div>

    <div class="card">
        <div>Realized PnL</div>
        <div id="pnl" class="big">$0</div>
    </div>
</div>

<h2>Open Positions</h2>

<table>
    <thead>
        <tr>
            <th>Pair</th>
            <th>Entry</th>
            <th>Current</th>
            <th>Quantity</th>
            <th>Notional</th>
            <th>AI Confidence</th>
            <th>P/L</th>
        </tr>
    </thead>
    <tbody id="positions"></tbody>
</table>

<h2>Recent Trades</h2>

<table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Pair</th>
            <th>Action</th>
            <th>Price</th>
            <th>PnL</th>
        </tr>
    </thead>
    <tbody id="tradeRows"></tbody>
</table>

<script>
function money(v) {
    return "$" + Number(v || 0).toFixed(2);
}

async function fetchJson(path, fallback) {
    try {
        const res = await fetch(path + "?t=" + Date.now());
        return await res.json();
    } catch {
        return fallback;
    }
}

async function loadDashboard() {

    const portfolio = await fetchJson("./paper_portfolio.json", {});
    const positionsForValue = portfolio.positions || {};

const openPositionValue = Object.values(positionsForValue).reduce(
    (sum, pos) => sum + Number(pos.market_value || pos.notional || 0),
    0
);

const totalPortfolioValue =
    Number(portfolio.cash || 0) + openPositionValue;
    const trades = await fetchJson("./trade_log.json", []);

    document.getElementById("value").innerText =
        money(portfolio.total_value || 0);

    document.getElementById("cash").innerText =
        money(portfolio.cash || 0);

    document.getElementById("trades").innerText =
        trades.length;

    const wins = trades.filter(t => (t.pnl || 0) > 0).length;

    const winrate =
        trades.length
            ? ((wins / trades.length) * 100).toFixed(1)
            : "0.0";

    document.getElementById("winrate").innerText =
        winrate + "%";

    const totalPnl =
        trades.reduce((sum, t) => sum + (t.pnl || 0), 0);

    const pnlEl = document.getElementById("pnl");

    pnlEl.innerText = money(totalPnl);

    pnlEl.className =
        "big " + (totalPnl >= 0 ? "green" : "red");

    const tbody = document.getElementById("positions");

    tbody.innerHTML = "";

    const positions = portfolio.positions || {};

    Object.entries(positions).forEach(([pair, pos]) => {

        const tr = document.createElement("tr");

        const pnl = pos.unrealized_pnl || 0;

        tr.innerHTML = `
            <td>${pair}</td>
            <td>${money(pos.entry_price)}</td>
            <td>${money(pos.current_price)}</td>
            <td>${Number(pos.quantity || 0).toFixed(6)}</td>
            <td>${money(pos.market_value)}</td>
            <td>${pos.ai_confidence || 0}</td>
            <td class="${pnl >= 0 ? 'green' : 'red'}">
                ${money(pnl)}
            </td>
        `;

        tbody.appendChild(tr);
    });

    const tradeBody = document.getElementById("tradeRows");

    tradeBody.innerHTML = "";

    trades.slice().reverse().slice(0, 25).forEach(trade => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${trade.time || ""}</td>
            <td>${trade.pair || ""}</td>
            <td>${trade.action || ""}</td>
            <td>${money(trade.price)}</td>
            <td>${money(trade.pnl || 0)}</td>
        `;

        tradeBody.appendChild(tr);
    });
}

loadDashboard();

setInterval(loadDashboard, 30000);
</script>

</body>
</html>
